<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Editor - Richa Sharma</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="index.css">

    <style>
        .editor-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .input-title {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 2px solid transparent;
            color: var(--text-primary);
            font-size: 2.5rem;
            font-family: var(--font-hindi), var(--font-main);
            outline: none;
            padding: 10px 0;
            margin-bottom: 1.5rem;
            transition: border-color 0.3s;
        }

        .input-title:focus {
            border-bottom-color: var(--accent-neon);
        }

        /* Toolbar styles */
        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 1rem;
            padding: 10px;
            background: var(--bg-primary);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            flex-wrap: wrap;
        }

        .toolbar button {
            background: var(--bg-hover);
            border: 1px solid transparent;
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-family: var(--font-main);
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .toolbar button:hover {
            border-color: var(--accent-neon);
            color: var(--accent-neon);
        }

        .toolbar select {
            background: var(--bg-hover);
            color: var(--text-primary);
            border: 1px solid transparent;
            padding: 8px;
            border-radius: 4px;
            outline: none;
            cursor: pointer;
        }

        .toolbar select:focus {
            border-color: var(--accent-neon);
        }

        /* The Content Area */
        .content-editor {
            min-height: 400px;
            padding: 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-primary);
            font-family: var(--font-hindi), var(--font-main);
            font-size: 1.15rem;
            line-height: 1.8;
            color: #dcdcdc;
            outline: none;
        }

        .content-editor:focus {
            border-color: var(--accent-neon);
            box-shadow: 0 0 10px rgba(234, 255, 0, 0.1);
        }

        .content-editor p {
            margin-bottom: 1.5rem;
        }

        .content-editor img {
            max-width: 100%;
            border-radius: 8px;
            margin: 20px 0;
            display: block;
            border: 1px dashed var(--accent-neon);
        }

        #image-upload {
            display: none;
        }

        /* Mobile Responsiveness for Editor */
        @media (max-width: 768px) {
            .editor-container {
                padding: 1.2rem;
            }

            .editor-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }

            .input-title {
                font-size: 1.5rem;
            }

            .toolbar {
                flex-wrap: wrap;
                gap: 5px;
            }

            .toolbar button,
            .toolbar select {
                font-size: 0.9rem;
                padding: 6px;
            }

            .content-editor {
                min-height: 250px;
                padding: 0.8rem;
                font-size: 1rem;
            }
        }
    </style>
</head>

<body>

    <header class="glass-panel">
        <div class="logo">
            <img src="https://i.ibb.co/sdv2yVRL/unnamed-removebg-preview.png" alt="Richa Logo" class="logo-circle"
                style="object-fit: cover; background: transparent; padding: 0;">
            <h1 style="font-size: 1.5rem; font-family: var(--font-hindi), var(--font-main);"><a href="index.html"
                    style="color: inherit; text-decoration: none;">ऋचा<span class="accent">एं</span></a></h1>
        </div>
        <nav>
            <ul>
                <li><span class="neon-text-accent" style="font-weight: 600;">Admin Dashboard</span></li>
            </ul>
        </nav>
        <div class="auth-buttons">
            <button class="neon-btn" style="border-color: #ff4a4a; color: #ff4a4a;"
                onclick="logoutUser()">Logout</button>
        </div>
    </header>

    <main class="animate-fade-in">
        <!-- Tab Navigation -->
        <div style="display: flex; gap: 15px; margin-bottom: 2rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1.2rem; flex-wrap: wrap; max-width: 1200px; margin: 0 auto 2rem auto; padding-left: 1rem; padding-right: 1rem;">
            <button onclick="switchTab('write')" id="tabBtn-write" class="neon-btn" style="background: var(--accent-neon); color: var(--bg-primary); border-color: var(--accent-neon); font-weight: bold; padding: 10px 22px; font-size: 0.95rem;">
                📝 Write Story
            </button>
            <button onclick="switchTab('socials')" id="tabBtn-socials" class="neon-btn" style="background: transparent; color: inherit; border-color: var(--border-color); font-weight: bold; padding: 10px 22px; font-size: 0.95rem;">
                🔗 Social Settings
            </button>
            <button onclick="switchTab('users')" id="tabBtn-users" class="neon-btn" style="background: transparent; color: inherit; border-color: var(--border-color); font-weight: bold; padding: 10px 22px; font-size: 0.95rem;">
                👥 User Management
            </button>
        </div>

        <div class="editor-container" id="writeSection">
            <div class="editor-header">
                <h2 style="margin: 0; font-size: 1.5rem;">Draft New Story</h2>
                <div style="display: flex; gap: 15px;">
                    <button class="neon-btn" style="background: transparent;" id="saveDraftBtn"
                        onclick="saveDraft()">Save Draft</button>
                    <button class="neon-btn" style="background: var(--accent-neon); color: var(--bg-primary);"
                        id="publishBtn">Publish</button>
                </div>
            </div>

            <!-- Title Input -->
            <input type="text" class="input-title" placeholder="कहानी का शीर्षक दर्ज करें (Enter Title)...">

            <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
                <input type="file" id="cover-upload" accept="image/*" style="display: none;">
                <button class="neon-btn" id="coverUploadBtn" style="padding: 8px 15px; font-size: 0.85rem;"
                    onclick="document.getElementById('cover-upload').click()">+ Upload Cover Image</button>

                <select id="typeSelect"
                    style="background: var(--bg-primary); color: var(--text-primary); border: 1px solid var(--border-color); padding: 5px 10px; border-radius: 4px; outline: none; flex-grow: 1; margin-left: 10px;">
                    <option value="story">Publish as Story</option>
                    <option value="article">Publish as Article</option>
                    <option value="series">Publish as Series</option>
                    <option value="comics">Publish as Comics</option>
                    <option value="drama">Publish as Drama</option>
                </select>
            </div>

            <!-- Editor Toolbar -->
            <div class="toolbar">
                <button onclick="format('bold')" title="Bold"><b>B</b></button>
                <button onclick="format('italic')" title="Italic"><i>I</i></button>
                <button onclick="format('underline')" title="Underline"><u>U</u></button>
                |
                <button onclick="format('justifyLeft')" title="Left Align">Left</button>
                <button onclick="format('justifyCenter')" title="Center Align">Center</button>
                |
                <select onchange="format('formatBlock', this.value)" title="Formatting Block">
                    <option value="P">Paragraph</option>
                    <option value="H1">Heading 1</option>
                    <option value="H2">Heading 2</option>
                    <option value="H3">Heading 3</option>
                    <option value="H4">Heading 4</option>
                    <option value="blockquote">Quote Block</option>
                </select>
                <select title="Font Size" onchange="if(this.value){format('fontSize', this.value); this.value='';}">
                    <option value="">Font Size</option>
                    <option value="2">Small</option>
                    <option value="3">Normal</option>
                    <option value="4">Medium</option>
                    <option value="5">Large</option>
                    <option value="6">Extra Large</option>
                </select>
                <select title="Text Color" onchange="if(this.value){format('foreColor', this.value); this.value='';}">
                    <option value="">Text Color</option>
                    <option value="#ffffff" style="color: #ffffff; background: #000;">White</option>
                    <option value="#eaff00" style="color: #eaff00; background: #000;">Neon Yellow</option>
                    <option value="#2ecc71" style="color: #2ecc71; background: #000;">Neon Green</option>
                    <option value="#3498db" style="color: #3498db; background: #000;">Neon Blue</option>
                    <option value="#ff4a4a" style="color: #ff4a4a; background: #000;">Neon Red</option>
                </select>
                |
                <button onclick="format('insertUnorderedList')" title="Bullet List">• List</button>
                <button onclick="format('insertOrderedList')" title="Numbered List">1. List</button>
                <button onclick="format('insertHorizontalRule')" title="Horizontal Line">― Divider</button>
                |
                <button onclick="format('undo')" title="Undo">Undo</button>
                <button onclick="format('redo')" title="Redo">Redo</button>
                |
                <!-- Image Insertion inside Content -->
                <button id="inlineImageBtn" style="color: var(--accent-neon); font-weight: bold;"
                    onclick="document.getElementById('image-upload').click()">+ Insert Image</button>
                <input type="file" id="image-upload" accept="image/*" onchange="insertImage(this)">
            </div>

            <!-- Rich Text Editable Area -->
            <div class="content-editor" id="editor" contenteditable="true"
                placeholder="Type your story here... (Hindi keyboard supported natively)"></div>

        </div>

        <!-- Admin Socials Settings Section -->
        <div class="editor-container" id="socialsSection" style="margin-top: 0rem; display: none;">
            <h3 class="neon-text" style="font-size: 1.4rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 10px;">
                <span>🔗 Admin Social Links Settings</span>
            </h3>
            <div class="glass-panel" style="padding: 25px; border-radius: 8px; border: 1px solid rgba(234, 255, 0, 0.15); background: rgba(18, 18, 18, 0.6); backdrop-filter: blur(10px);">
                <form id="socialsForm" style="display: flex; flex-direction: column; gap: 15px;">
                    <div style="display: flex; flex-direction: column; gap: 5px;">
                        <label style="color: var(--text-secondary); font-size: 0.9rem;">Instagram Profile Link</label>
                        <input type="url" id="instagramUrl" placeholder="https://instagram.com/username"
                            style="padding: 10px; border-radius: 6px; border: 1px solid var(--border-color); background: rgba(255, 255, 255, 0.05); color: var(--text-primary); font-family: var(--font-main); outline: none;">
                    </div>

                    <div style="display: flex; flex-direction: column; gap: 5px;">
                        <label style="color: var(--text-secondary); font-size: 0.9rem;">Facebook Profile Link</label>
                        <input type="url" id="facebookUrl" placeholder="https://facebook.com/username"
                            style="padding: 10px; border-radius: 6px; border: 1px solid var(--border-color); background: rgba(255, 255, 255, 0.05); color: var(--text-primary); font-family: var(--font-main); outline: none;">
                    </div>

                    <button type="submit" class="neon-btn" style="align-self: flex-start; padding: 10px 20px; margin-top: 10px;">Save Social Links</button>
                </form>
            </div>
        </div>

        <!-- Registered Users Management Section -->
        <div class="editor-container" id="usersSection" style="margin-top: 0rem; display: none;">
            <h3 class="neon-text" style="font-size: 1.4rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 10px;">
                <span>👥 Registered Users Management</span>
            </h3>
            <div class="glass-panel" style="padding: 25px; border-radius: 8px; border: 1px solid rgba(234, 255, 0, 0.15); background: rgba(18, 18, 18, 0.6); backdrop-filter: blur(10px); overflow-x: auto;">
                <div id="usersLoading" style="color: var(--text-secondary);">Loading users...</div>
                <table id="usersTable" style="display: none; width: 100%; border-collapse: collapse; text-align: left; min-width: 600px;">
                    <thead>
                        <tr style="border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding-bottom: 10px;">
                            <th style="padding: 10px; color: var(--text-secondary);">ID</th>
                            <th style="padding: 10px; color: var(--text-secondary);">Name</th>
                            <th style="padding: 10px; color: var(--text-secondary);">Email</th>
                            <th style="padding: 10px; color: var(--text-secondary);">Role</th>
                            <th style="padding: 10px; color: var(--text-secondary);">Status</th>
                            <th style="padding: 10px; color: var(--text-secondary);">Joined Date</th>
                            <th style="padding: 10px; color: var(--text-secondary); text-align: right;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Richa Sharma. Admin Interface.</p>
    </footer>

    <!-- Draft Save Toast -->
    <div id="draftToast"
        style="display:none; position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:var(--accent-neon); color:var(--bg-primary); padding:12px 24px; border-radius:8px; font-weight:700; font-family:var(--font-main); box-shadow:0 4px 20px rgba(234,255,0,0.4); z-index:9999; letter-spacing:0.5px;">
    </div>

    <script src="auth.js"></script>
    <script src="db.js"></script>
    <script src="app.js"></script>
    <script>
        // Protect strict admin route
        if (!isAdmin()) {
            window.location.href = 'login.html';
        }

        let coverImageData = { url: null, key: null };

        // Simple wysiwyg commands
        function format(command, value) {
            document.execCommand(command, false, value);
            document.getElementById('editor').focus();
        }

        // ===== Save & Restore Draft (localStorage) =====
        const DRAFT_KEY = 'richa_story_draft';

        function saveDraft() {
            const title = document.querySelector('.input-title').value.trim();
            const content = document.getElementById('editor').innerHTML.trim();
            const category = document.getElementById('typeSelect').value;

            if (!title && !content) {
                showDraftToast('Nothing to save!', '#ff4a4a');
                return;
            }

            localStorage.setItem(DRAFT_KEY, JSON.stringify({ title, content, category }));
            showDraftToast('Draft saved! ✓', 'var(--accent-neon)');
        }

        function showDraftToast(message, color) {
            const toast = document.getElementById('draftToast');
            toast.innerText = message;
            toast.style.background = color;
            toast.style.color = color === 'var(--accent-neon)' ? 'var(--bg-primary)' : '#fff';
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2500);
        }

        // Restore draft on page load
        window.addEventListener('DOMContentLoaded', () => {
            const saved = localStorage.getItem(DRAFT_KEY);
            if (saved) {
                try {
                    const draft = JSON.parse(saved);
                    if (draft.title) document.querySelector('.input-title').value = draft.title;
                    if (draft.content) document.getElementById('editor').innerHTML = draft.content;
                    if (draft.category) document.getElementById('typeSelect').value = draft.category;
                    showDraftToast('📝 Draft restored from last session', 'var(--accent-neon)');
                } catch (e) {
                    localStorage.removeItem(DRAFT_KEY);
                }
            }
        });

        // Handle Cover Image Upload
        document.getElementById('cover-upload').addEventListener('change', async function (e) {
            const file = e.target.files[0];
            if (!file) return;

            const uploadBtn = document.getElementById('coverUploadBtn');
            const originalText = uploadBtn.innerText;
            uploadBtn.innerText = 'Uploading...';
            uploadBtn.disabled = true;

            try {
                const result = await uploadImage(file);
                coverImageData = { url: result.url, key: result.key };
                uploadBtn.innerText = 'Cover Image Uploaded!';
                uploadBtn.style.background = 'var(--text-secondary)';
                uploadBtn.style.color = '#000';
                uploadBtn.style.borderColor = 'transparent';
            } catch (err) {
                if (err.message && err.message.includes('session has expired')) {
                    alert(err.message);
                    window.location.href = 'login.html';
                    return;
                }
                alert('Cover upload failed: ' + err.message);
                uploadBtn.innerText = originalText;
                uploadBtn.disabled = false;
            }
        });

        // Handle Inline Image insertion
        async function insertImage(input) {
            const file = input.files[0];
            if (!file) return;

            const originalBtnText = document.getElementById('inlineImageBtn').innerText;
            document.getElementById('inlineImageBtn').innerText = 'Uploading...';
            document.getElementById('inlineImageBtn').style.opacity = '0.5';

            try {
                const result = await uploadImage(file);
                // Insert the uploaded URL into the editor
                document.getElementById('editor').focus();
                const imgHtml = `<img src="${result.url}" alt="Story Image"><br>`;
                document.execCommand('insertHTML', false, imgHtml);
            } catch (err) {
                if (err.message && err.message.includes('session has expired')) {
                    alert(err.message);
                    window.location.href = 'login.html';
                    return;
                }
                alert('Inline image upload failed: ' + err.message);
            } finally {
                document.getElementById('inlineImageBtn').innerText = '+ Insert Image';
                document.getElementById('inlineImageBtn').style.opacity = '1';
                // Reset input
                input.value = '';
            }
        }

        // Publish Action
        document.getElementById('publishBtn').addEventListener('click', async () => {
            const publishBtn = document.getElementById('publishBtn');
            const title = document.querySelector('.input-title').value.trim();
            const typeSelect = document.getElementById('typeSelect');
            const type = typeSelect.value;
            const content = document.getElementById('editor').innerHTML.trim();

            if (!title) {
                alert("Please enter a title before publishing.");
                return;
            }
            if (!content || content === "") {
                alert("Please write some content for your story/article.");
                return;
            }

            // Create a plain text excerpt (first 150 chars)
            const tempDiv = document.createElement("div");
            tempDiv.innerHTML = content;
            const excerpt = tempDiv.textContent.substring(0, 150) + '...';

            publishBtn.innerText = 'Publishing...';
            publishBtn.disabled = true;

            try {
                const storyData = {
                    title: title,
                    category: type, // Using category field to store type 'story' or 'article'
                    content: content,
                    excerpt: excerpt,
                    cover_image_url: coverImageData.url,
                    cover_image_key: coverImageData.key
                };

                await createStory(storyData);

                // Clear the saved draft on successful publish
                localStorage.removeItem(DRAFT_KEY);

                alert(`"${title}" published successfully as ${type}!`);
                window.location.href = 'index.html';
            } catch (err) {
                if (err.message && err.message.includes('session has expired')) {
                    alert(err.message);
                    window.location.href = 'login.html';
                    return;
                }
                alert('Publish failed: ' + (err.message || 'Unknown error'));
                publishBtn.innerText = 'Publish';
                publishBtn.disabled = false;
            }
        });

        // ===== Load & Save Admin Social Links =====
        async function loadAdminSocials() {
            try {
                const profile = await getAdminProfile();
                if (profile) {
                    document.getElementById('instagramUrl').value = profile.instagram_url || '';
                    document.getElementById('facebookUrl').value = profile.facebook_url || '';
                }
            } catch (err) {
                console.error('Failed to load socials:', err);
            }
        }

        document.getElementById('socialsForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerText;
            submitBtn.innerText = 'Saving...';
            submitBtn.disabled = true;

            const instagramUrl = document.getElementById('instagramUrl').value.trim();
            const facebookUrl = document.getElementById('facebookUrl').value.trim();

            try {
                await updateAdminProfile({ instagram_url: instagramUrl, facebook_url: facebookUrl });
                showDraftToast('Social links updated! ✓', 'var(--accent-neon)');
            } catch (err) {
                showDraftToast('Failed to save socials: ' + err.message, '#ff4a4a');
            } finally {
                submitBtn.innerText = originalText;
                submitBtn.disabled = false;
            }
        });

        // ===== Load & Save Registered Users =====
        let globalUsersList = [];

        async function fetchRegisteredUsers() {
            const loadingDiv = document.getElementById('usersLoading');
            const table = document.getElementById('usersTable');
            const tbody = document.getElementById('usersTableBody');

            try {
                const data = await getUsers();
                globalUsersList = data || [];
                tbody.innerHTML = '';

                if (globalUsersList.length === 0) {
                    loadingDiv.innerText = 'No registered users found.';
                    return;
                }

                const currentUser = getCurrentUser();

                globalUsersList.forEach(usr => {
                    const row = document.createElement('tr');
                    row.style.borderBottom = '1px solid rgba(255, 255, 255, 0.05)';

                    const isSelf = currentUser && usr.id === currentUser.id;
                    const actionButton = isSelf 
                        ? `<span style="font-size: 0.8rem; color: var(--text-secondary); font-style: italic;">Logged In</span>`
                        : `<button class="neon-btn" onclick="handleToggleBlockVanilla(${usr.id}, '${usr.email}')" 
                              style="border-color: ${usr.status === 'blocked' ? '#2ecc71' : '#ff4a4a'}; 
                                     color: ${usr.status === 'blocked' ? '#2ecc71' : '#ff4a4a'}; 
                                     padding: 5px 12px; font-size: 0.8rem; background: transparent;">
                              ${usr.status === 'blocked' ? 'Unblock' : 'Block User'}
                           </button>`;

                    const roleTagStyle = usr.role === 'admin' 
                        ? `background: var(--accent-neon); color: var(--bg-primary);` 
                        : `background: #555; color: inherit;`;

                    const statusStyle = usr.status === 'blocked'
                        ? `color: #ff4a4a; text-shadow: 0 0 10px rgba(255,74,74,0.4); font-weight: bold;`
                        : `color: #2ecc71; font-weight: bold;`;

                    row.innerHTML = `
                        <td style="padding: 10px; color: var(--text-secondary);">${usr.id}</td>
                        <td style="padding: 10px; font-weight: bold;">${usr.name || 'N/A'}</td>
                        <td style="padding: 10px;">${usr.email}</td>
                        <td style="padding: 10px;">
                            <span class="story-tag" style="font-size: 0.75rem; padding: 3px 8px; ${roleTagStyle}">
                                ${usr.role}
                            </span>
                        </td>
                        <td style="padding: 10px;">
                            <span style="${statusStyle}">
                                ${(usr.status || 'active').toUpperCase()}
                            </span>
                        </td>
                        <td style="padding: 10px; color: var(--text-secondary); font-size: 0.85rem;">
                            ${new Date(usr.created_at).toLocaleDateString()}
                        </td>
                        <td style="padding: 10px; text-align: right;">
                            ${actionButton}
                        </td>
                    `;
                    tbody.appendChild(row);
                });

                loadingDiv.style.display = 'none';
                table.style.display = 'table';
            } catch (err) {
                loadingDiv.innerText = 'Failed to load users: ' + err.message;
            }
        }

        async function handleToggleBlockVanilla(userId, userEmail) {
            const targetUser = globalUsersList.find(u => u.id === userId);
            const actionText = targetUser && targetUser.status === 'blocked' ? 'unblock' : 'block';
            if (!confirm(`Are you sure you want to ${actionText} ${userEmail}?`)) {
                return;
            }

            try {
                await toggleBlockUser(userId);
                showDraftToast(`User status updated to ${actionText}ed`, 'var(--accent-neon)');
                fetchRegisteredUsers();
            } catch (err) {
                alert('Failed to update status: ' + err.message);
            }
        }

        window.handleToggleBlockVanilla = handleToggleBlockVanilla;

        function switchTab(tabName) {
            const sections = {
                write: document.getElementById('writeSection'),
                socials: document.getElementById('socialsSection'),
                users: document.getElementById('usersSection')
            };

            const buttons = {
                write: document.getElementById('tabBtn-write'),
                socials: document.getElementById('tabBtn-socials'),
                users: document.getElementById('tabBtn-users')
            };

            // Toggle sections
            Object.keys(sections).forEach(key => {
                if (sections[key]) {
                    if (key === tabName) {
                        sections[key].style.display = 'block';
                    } else {
                        sections[key].style.display = 'none';
                    }
                }
            });

            // Toggle buttons background/color
            Object.keys(buttons).forEach(key => {
                if (buttons[key]) {
                    if (key === tabName) {
                        buttons[key].style.background = 'var(--accent-neon)';
                        buttons[key].style.color = 'var(--bg-primary)';
                        buttons[key].style.borderColor = 'var(--accent-neon)';
                    } else {
                        buttons[key].style.background = 'transparent';
                        buttons[key].style.color = 'inherit';
                        buttons[key].style.borderColor = 'var(--border-color)';
                    }
                }
            });
        }
        window.switchTab = switchTab;

        // Trigger on load
        window.addEventListener('DOMContentLoaded', () => {
            loadAdminSocials();
            fetchRegisteredUsers();
            switchTab('write');
        });
    </script>
</body>

</html>
