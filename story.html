<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Read Story - Richa Sharma</title>

    <!-- Google Fonts - Multiple Font Styles -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@300;400;500;600;700;800&family=Hind:wght@300;400;500;600;700&family=Tiro+Devanagari&family=Baloo+2:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600;700&family=Bangers&family=Comic+Neue:ital,wght@0,300;0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Rajdhani:wght@400;500;600;700&family=Merriweather:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="index.css">
    <style>
        .story-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .story-header h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            font-family: var(--font-hindi), var(--font-main);
        }

        .story-main-image {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 2rem;
            border: 1px solid rgba(234, 255, 0, 0.2);
        }

        .story-article {
            font-family: var(--font-hindi), var(--font-main);
            font-size: 1.15rem;
            color: #dcdcdc;
            line-height: 1.8;
            max-width: 800px;
            margin: 0 auto;
        }

        .story-article p {
            margin-bottom: 1.5rem;
        }

        .story-article img {
            max-width: 100%;
            border-radius: 8px;
            margin: 20px 0;
            display: block;
            border: 1px solid var(--border-color);
        }

        /* === Category-Based Font Styles for Reading Page === */

        /* Comics Reading Style */
        .story-article.cat-comics {
            font-family: var(--font-comic-body, 'Comic Neue', cursive);
            font-size: 1.15rem;
            line-height: 1.9;
        }

        .story-article.cat-comics h1,
        .story-article.cat-comics h2,
        .story-article.cat-comics h3 {
            font-family: var(--font-comic, 'Bangers', cursive) !important;
            letter-spacing: 2px;
            color: #ff6b35;
            text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.4);
        }

        .story-article.cat-comics .story-header h1 {
            font-family: var(--font-comic, 'Bangers', cursive) !important;
            font-size: 3.5rem !important;
            letter-spacing: 3px;
            color: #ff6b35;
            text-shadow: 4px 4px 0 rgba(255, 107, 53, 0.3), -1px -1px 0 #000;
            line-height: 1.1;
        }

        /* Story / Drama Reading Style */
        .story-article.cat-story,
        .story-article.cat-drama {
            font-family: var(--font-story, 'Lora', serif);
            font-size: 1.18rem;
            line-height: 1.9;
            color: #e0ddd8;
        }

        .story-article.cat-drama .story-header h1 {
            font-family: var(--font-story, 'Lora', serif) !important;
            font-style: italic;
            color: #e74c3c;
        }

        /* Series Reading Style */
        .story-article.cat-series {
            font-family: var(--font-hindi, 'Hind', sans-serif);
            font-size: 1.15rem;
            line-height: 1.85;
        }

        .story-article.cat-series h1,
        .story-article.cat-series h2 {
            font-family: var(--font-series, 'Rajdhani', sans-serif) !important;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #3498db;
        }

        .story-article.cat-series .story-header h1 {
            font-family: var(--font-series, 'Rajdhani', sans-serif) !important;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #3498db;
        }

        /* Article Reading Style */
        .story-article.cat-article {
            font-family: var(--font-article, 'Merriweather', serif);
            font-size: 1.1rem;
            line-height: 2;
            color: #e0ddd8;
        }

        .story-article.cat-article .story-header h1 {
            font-family: var(--font-article, 'Merriweather', serif) !important;
        }

        /* Comments Section */
        .comments-section {
            max-width: 800px;
            margin: 4rem auto 0;
            padding-top: 2rem;
            border-top: 1px solid var(--border-color);
        }

        .comment-box {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            border-left: 3px solid var(--accent-neon);
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .comment-header strong {
            color: var(--text-primary);
        }

        .new-comment-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 2rem;
        }

        .new-comment-form textarea,
        .new-comment-form input {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px;
            border-radius: 6px;
            font-family: var(--font-main);
            outline: none;
            transition: border-color 0.3s ease;
        }

        .new-comment-form textarea:focus,
        .new-comment-form input:focus {
            border-color: var(--accent-neon);
            box-shadow: 0 0 5px var(--accent-glow);
        }

        /* Responsive Styles */
        @media (max-width: 768px) {
            .story-header h1 {
                font-size: 2.2rem;
            }

            .story-article {
                padding: 1.5rem;
                margin-bottom: 2rem;
            }

            .story-main-image {
                max-height: 300px;
                border-radius: 8px;
            }

            .comments-list {
                padding: 1.5rem;
            }
        }

        @media (max-width: 480px) {
            .story-header h1 {
                font-size: 1.8rem;
            }

            .story-article {
                padding: 1rem;
            }

            .story-main-image {
                max-height: 250px;
            }
        }
    </style>
</head>

<body>

    <header class="glass-panel">
        <div class="logo">
            <img src="https://i.ibb.co/sdv2yVRL/unnamed-removebg-preview.png" alt="Richa Logo" class="logo-circle"
                style="object-fit: cover; background: transparent; padding: 0;">
            <h1 style="font-size: 1.5rem; font-family: var(--font-hindi-bold), var(--font-main);"><a href="index.html"
                    style="color: inherit; text-decoration: none;">ऋचा<span class="accent">एं</span></a></h1>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">« Back Home</a></li>
            </ul>
        </nav>
        <div class="auth-buttons"></div>
    </header>

    <!-- Toast Notification -->
    <div id="shareToast"
        style="display:none; position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:var(--accent-neon); color:var(--bg-primary); padding:12px 24px; border-radius:8px; font-weight:700; font-family:var(--font-main); box-shadow:0 4px 20px rgba(234,255,0,0.4); z-index:9999; letter-spacing:0.5px; transition: opacity 0.3s;">
        🔗 Link copied to clipboard!</div>

    <main class="animate-fade-in">
        <article class="story-article" id="storyArticleContainer">
            <div style="text-align: center; padding: 4rem; color: var(--text-secondary);">
                Loading story...
            </div>
        </article>

        <!-- Comments Section -->
        <section class="comments-section">
            <h2 class="section-title" id="commentsTitle" style="font-size: 1.8rem;">Reader Thoughts</h2>

            <div class="comments-list" id="commentsList">
                <div style="color: var(--text-secondary);">Loading comments...</div>
            </div>

            <!-- Add Comment -->
            <form class="new-comment-form" id="newCommentForm" style="display: none;">
                <h3 style="margin-bottom: 0;">Leave a Comment</h3>
                <input type="text" placeholder="Your Name" required>
                <textarea rows="4" placeholder="Share your thoughts (English or Hindi)..." required
                    style="font-family: var(--font-hindi), var(--font-main);"></textarea>
                <button type="submit" class="neon-btn" style="align-self: flex-start;">Post Comment</button>
            </form>

            <div id="loginToCommentPrompt"
                style="display: none; text-align: center; margin-top: 2rem; padding: 2rem; border: 1px dashed var(--border-color); border-radius: 8px;">
                <p style="color: var(--text-secondary); margin-bottom: 1rem;">Please log in to share your thoughts.</p>
                <button class="neon-btn" onclick="openAuthModal()">Login to Comment</button>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Richa Sharma. All rights reserved.</p>
    </footer>

    <!-- Auth Modal -->
    <div id="authModal"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(5px);">
        <div class="glass-panel animate-fade-in"
            style="width: 100%; max-width: 400px; padding: 2rem; position: relative;">
            <button onclick="closeAuthModal()"
                style="position: absolute; right: 15px; top: 15px; background: none; border: none; color: var(--text-secondary); font-size: 1.5rem; cursor: pointer; line-height: 1;">&times;</button>

            <div id="authError"
                style="color: #ff4a4a; font-size: 0.85rem; display: none; margin-bottom: 1rem; text-align: center; border: 1px solid rgba(255, 74, 74, 0.3); padding: 8px; border-radius: 4px; background: rgba(255, 74, 74, 0.1);">
            </div>

            <!-- Login Form -->
            <form id="loginFormContent" onsubmit="handleUserAuth(event, true)"
                style="display: flex; flex-direction: column; gap: 1rem;">
                <h2 class="neon-text-accent" style="margin-top: 0; font-size: 1.8rem; text-align: center;">Welcome Back
                </h2>
                <input type="email" placeholder="Email Address" required
                    style="padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid var(--border-color); color: #fff; border-radius: 6px; outline: none; font-family: var(--font-main);">
                <input type="password" placeholder="Password" required
                    style="padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid var(--border-color); color: #fff; border-radius: 6px; outline: none; font-family: var(--font-main);">
                <button type="submit" class="neon-btn" style="width: 100%;">Login</button>
                <p style="text-align: center; color: var(--text-secondary); font-size: 0.9rem; margin-top: 10px;">
                    Don't have an account? <a href="#" onclick="toggleAuthMode(); return false;"
                        style="color: var(--accent-neon); text-decoration: none;">Sign up</a>
                </p>
            </form>

            <!-- Signup Form -->
            <form id="signupFormContent" onsubmit="handleUserAuth(event, false)"
                style="display: none; flex-direction: column; gap: 1rem;">
                <h2 class="neon-text-accent" style="margin-top: 0; font-size: 1.8rem; text-align: center;">Join Us</h2>
                <input type="text" placeholder="Full Name" required
                    style="padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid var(--border-color); color: #fff; border-radius: 6px; outline: none; font-family: var(--font-main);">
                <input type="email" placeholder="Email Address" required
                    style="padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid var(--border-color); color: #fff; border-radius: 6px; outline: none; font-family: var(--font-main);">
                <input type="password" placeholder="Password (min 6 chars)" required
                    style="padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid var(--border-color); color: #fff; border-radius: 6px; outline: none; font-family: var(--font-main);">
                <button type="submit" class="neon-btn" style="width: 100%;">Sign Up</button>
                <p style="text-align: center; color: var(--text-secondary); font-size: 0.9rem; margin-top: 10px;">
                    Already have an account? <a href="#" onclick="toggleAuthMode(); return false;"
                        style="color: var(--accent-neon); text-decoration: none;">Login</a>
                </p>
            </form>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="db.js"></script>
    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const storyId = params.get('id');
            const articleContainer = document.getElementById('storyArticleContainer');
            const commentsList = document.getElementById('commentsList');
            const commentsTitle = document.getElementById('commentsTitle');

            if (!storyId) {
                articleContainer.innerHTML = '<div style="text-align: center; padding: 4rem; color: #ff4a4a;">Story not found!</div>';
                commentsList.innerHTML = '';
                return;
            }

            try {
                // Fetch Story
                const story = await getStory(storyId);

                if (!story) {
                    articleContainer.innerHTML = '<div style="text-align: center; padding: 4rem; color: #ff4a4a;">Story not found!</div>';
                    return;
                }

                document.title = `${story.title} - Richa Sharma`;
                const dateObj = new Date(story.created_at);
                const formattedDate = dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                const authorName = story.profiles?.name || 'Richa Sharma';

                // Apply category-specific font class
                const category = (story.category || 'story').toLowerCase();
                articleContainer.classList.add(`cat-${category}`);

                const deleteBtnHtml = isAdmin() ? `<button onclick="handleDelete(event, '${story.id}')" class="neon-btn" style="border-color: #ff4a4a; color: #ff4a4a; padding: 5px 15px;">Delete Post</button>` : '';

                let html = `
                    <div class="story-header" style="text-align: center;">
                        <span class="story-tag" style="margin-bottom: 15px; display: inline-block;">${story.category || 'Story'}</span>
                        <h1 class="neon-text">${story.title}</h1>
                        <p class="story-meta" style="justify-content: center; gap: 20px; font-size: 1rem; border: none; padding: 0;">
                            <span>By ${authorName}</span>
                            <span>•</span>
                            <span>${formattedDate}</span>
                        </p>
                        ${isAdmin() ? `<div style="margin-top: 20px;">${deleteBtnHtml}</div>` : ''}
                    </div>
                `;

                if (story.cover_image_url) {
                    html += `<img src="${story.cover_image_url}" alt="Cover Image" class="story-main-image">`;
                }

                html += `
                    <div>${story.content}</div>
                    <div style="margin-top: 3rem; text-align: center;">
                        <button class="neon-btn" onclick="shareStory()">Share This Story</button>
                    </div>
                `;

                articleContainer.innerHTML = html;

                // Fetch Comments
                loadComments(storyId);

            } catch (err) {
                console.error("Failed to load story", err);
                articleContainer.innerHTML = `<div style="text-align: center; padding: 4rem; color: #ff4a4a;">Error loading story: ${err.message}</div>`;
            }

            // Global delete handler
            window.handleDelete = async function (event, id) {
                event.stopPropagation();
                if (confirm('Are you sure you want to delete this permanently?')) {
                    try {
                        await deleteStory(id);
                        alert('Deleted successfully!');
                        window.location.href = 'index.html';
                    } catch (err) {
                        alert('Delete failed: ' + err.message);
                    }
                }
            };

            // Handle New Comment
            document.getElementById('newCommentForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const contentTextarea = e.target.querySelector('textarea');
                const content = contentTextarea.value.trim();
                const submitBtn = e.target.querySelector('button[type="submit"]');

                if (!content) return;

                submitBtn.disabled = true;
                submitBtn.innerText = 'Posting...';

                try {
                    await addComment(storyId, content);
                    contentTextarea.value = '';
                    loadComments(storyId); // Reload comments
                } catch (err) {
                    alert('Failed to post comment: ' + err.message);
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.innerText = 'Post Comment';
                }
            });
        });

        function shareStory() {
            const url = window.location.href;
            if (navigator.share) {
                navigator.share({ title: document.title, url: url }).catch(() => { });
            } else {
                navigator.clipboard.writeText(url).then(() => {
                    const toast = document.getElementById('shareToast');
                    toast.style.display = 'block';
                    setTimeout(() => { toast.style.display = 'none'; }, 2500);
                });
            }
        }

        async function loadComments(storyId) {
            const commentsList = document.getElementById('commentsList');
            const commentsTitle = document.getElementById('commentsTitle');

            try {
                const comments = await getComments(storyId);

                commentsTitle.innerText = `Reader Thoughts (${comments ? comments.length : 0})`;

                if (!comments || comments.length === 0) {
                    commentsList.innerHTML = '<div style="color: var(--text-secondary);">No comments yet. Be the first to share your thoughts!</div>';
                    return;
                }

                commentsList.innerHTML = '';
                comments.forEach(comment => {
                    const dateObj = new Date(comment.created_at);
                    const formattedDate = dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' });

                    const div = document.createElement('div');
                    div.className = 'comment-box';
                    div.innerHTML = `
                        <div class="comment-header">
                            <strong>${comment.profiles?.name || 'Anonymous User'}</strong>
                            <span>${formattedDate}</span>
                        </div>
                        <div class="comment-body" style="font-family: var(--font-hindi), var(--font-main);">
                            ${comment.content.replace(/\n/g, '<br>')}
                        </div>
                    `;
                    commentsList.appendChild(div);
                });
            } catch (err) {
                console.error("Failed to load comments", err);
                commentsList.innerHTML = '<div style="color: #ff4a4a;">Failed to load comments.</div>';
            }
        }
    </script>
</body>

</html>
