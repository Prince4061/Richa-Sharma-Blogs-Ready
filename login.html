<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Richa Sharma</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="index.css">

    <style>
        .login-container {
            max-width: 400px;
            margin: 10vh auto;
            padding: 2.5rem;
            text-align: center;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-top: 2rem;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 6px;
            font-family: var(--font-main);
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: var(--accent-neon);
            box-shadow: 0 0 8px var(--accent-glow);
        }

        .error-msg {
            color: #ff4a4a;
            font-size: 0.85rem;
            display: none;
            margin-top: -10px;
        }
    </style>
</head>

<body>

    <main>
        <div class="glass-panel animate-fade-in login-container">
            <h1 class="neon-text-accent" style="margin: 0; font-size: 2rem;">Admin Access</h1>
            <p style="color: var(--text-secondary); margin-top: 5px;">Secure portal for Richa Sharma</p>

            <form class="login-form" onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="admin@domain.com">
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                    <div class="error-msg" id="loginError">Invalid credentials.</div>
                </div>

                <button type="submit" class="neon-btn" style="width: 100%; margin-top: 10px;">Login to
                    Dashboard</button>
            </form>

            <div style="margin-top: 2rem;">
                <a href="index.html"
                    style="color: var(--text-secondary); text-decoration: none; font-size: 0.9rem; transition: color 0.3s;"
                    onmouseover="this.style.color='var(--accent-neon)'"
                    onmouseout="this.style.color='var(--text-secondary)'">← Return to Public Site</a>
            </div>
        </div>
    </main>

    <script src="auth.js"></script>
    <script>
        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('loginError');
            const submitBtn = document.querySelector('button[type="submit"]');

            errorDiv.style.display = 'none';
            submitBtn.disabled = true;
            submitBtn.innerText = 'Verifying...';

            try {
                const data = await loginWithPassword(email, password);
                if (data.user && data.user.email === ADMIN_EMAIL) {
                    window.location.href = 'editor.html';
                } else {
                    throw new Error('Unauthorized: You are not an admin.');
                }
            } catch (err) {
                errorDiv.innerText = err.message || 'Login failed.';
                errorDiv.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.innerText = 'Login to Dashboard';
            }
        }
    </script>
</body>

</html>
